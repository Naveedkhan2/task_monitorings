<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- EPSILON SMART SOLUTIONS Logo - ESS -->
  <rect width="32" height="32" fill="#000000" rx="6"/>
  <!-- Circuit board pattern background -->
  <g opacity="0.3">
    <line x1="4" y1="4" x2="28" y2="4" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="8" x2="28" y2="8" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="12" x2="28" y2="12" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="16" x2="28" y2="16" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="20" x2="28" y2="20" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="28" y2="24" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="28" x2="28" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="4" y1="4" x2="4" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="8" y1="4" x2="8" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="12" y1="4" x2="12" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="16" y1="4" x2="16" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="20" y1="4" x2="20" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="24" y1="4" x2="24" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
    <line x1="28" y1="4" x2="28" y2="28" stroke="url(#fg)" stroke-width="0.5"/>
  </g>
  <!-- E -->
  <path d="M 6,8 L 6,24 M 6,16 L 12,16 M 6,8 L 12,8 M 6,24 L 12,24" 
        stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- S with lightning bolt integrated -->
  <path d="M 14,8 Q 18,8 18,12 Q 18,16 14,16 Q 18,16 18,20 Q 18,24 14,24" 
        stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 16,10 L 20,14 L 18,14 L 20,18 L 16,14 L 18,14 Z" fill="url(#fg)"/>
  <!-- S -->
  <path d="M 22,8 Q 26,8 26,12 Q 26,16 22,16 Q 26,16 26,20 Q 26,24 22,24" 
        stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
