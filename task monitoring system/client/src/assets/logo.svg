<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1d5db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
    <pattern id="circuitPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0,20 L40,20 M20,0 L20,40" stroke="#4b5563" stroke-width="0.5" opacity="0.3"/>
      <circle cx="20" cy="20" r="2" fill="#6b7280" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Sphere background -->
  <circle cx="100" cy="100" r="90" fill="url(#sphereGradient)" opacity="0.9"/>
  <circle cx="100" cy="100" r="90" fill="url(#circuitPattern)"/>
  
  <!-- ESS Letters with Lightning Bolt -->
  <g transform="translate(100, 100)">
    <!-- Letter E -->
    <path d="M -60,-20 L -60,20 M -60,0 L -40,0 M -60,-20 L -40,-20 M -60,20 L -40,20" 
          stroke="url(#textGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- First S with Lightning Bolt -->
    <path d="M -20,-20 Q -10,-20 -10,-10 Q -10,0 -20,0 Q -10,0 -10,10 Q -10,20 -20,20" 
          stroke="url(#textGradient)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- Lightning bolt integrated into S -->
    <path d="M -15,-15 L -5,-5 L -10,-5 L -5,5 L -15,-5 L -10,-5 Z" 
          fill="url(#textGradient)" opacity="0.9"/>
    
    <!-- Second S -->
    <path d="M 20,-20 Q 30,-20 30,-10 Q 30,0 20,0 Q 30,0 30,10 Q 30,20 20,20" 
          stroke="url(#textGradient)" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>

